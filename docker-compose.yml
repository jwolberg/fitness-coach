# One-command local stack (P5-T3): Neo4j + one-shot graph seed + FastAPI API + frontend.
# `docker compose up --build` brings up everything and seeds the graph on first boot.
# Reads env from .env (see .env.example) — OPENAI_API_KEY is required for retrieval/generation.

services:
  neo4j:
    image: neo4j:5.26-community  # 5.x ships the native vector index used from P1-T1
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    ports:
      - "7474:7474"  # HTTP / Neo4j Browser
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot: seed schema + exercises + Maya (+ embeddings if OPENAI_API_KEY set), then exit.
  seed:
    build: ./backend
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      EXERCISES_PATH: /data/exercises.json
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./exercises.json:/data/exercises.json:ro
    depends_on:
      neo4j:
        condition: service_healthy
    command: ["python", "-m", "app.seed"]
    restart: "no"

  api:
    build: ./backend
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-*}
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "8081:80"
    depends_on:
      - api

volumes:
  neo4j_data:
