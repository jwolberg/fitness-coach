# One-command local stack (P0-T2): Neo4j (graph + native vector index) + FastAPI API.
# The `frontend` service is added later (P5-T3). Reads env from .env (see .env.example).

services:
  neo4j:
    image: neo4j:5.26-community  # 5.x ships the native vector index used from P1-T1
    environment:
      # NEO4J_AUTH sets the initial neo4j-user password on first boot.
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    ports:
      - "7474:7474"  # HTTP / Neo4j Browser
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      # API waits for this before starting (depends_on: service_healthy).
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build: ./backend
    environment:
      # Inside the Compose network the graph is reachable by service name, not localhost.
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
